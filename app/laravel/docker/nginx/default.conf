# =============================================================================
# Nginx Konfiqurasiyası — Laravel üçün
# =============================================================================
#
# Nginx nədir?
# ------------
# Nginx — yüksək performanslı veb serverdir. Burada "reverse proxy" kimi
# istifadə olunur: brauzerdən gələn sorğuları qəbul edir və PHP-FPM-ə ötürür.
#
# Necə işləyir?
# -------------
# 1. Brauzer localhost:8080-ə sorğu göndərir
# 2. Docker host-un 8080 portunu Nginx konteynerinin 80 portuna yönləndirir
# 3. Nginx sorğunu emal edir:
#    - Statik fayl (CSS, JS, şəkil) olarsa — özü cavab verir
#    - PHP fayl olarsa — PHP-FPM-ə (app:9000) ötürür
# 4. PHP-FPM Laravel kodunu icra edir və cavabı Nginx-ə qaytarır
# 5. Nginx cavabı brauzerə göndərir
# =============================================================================

server {
    # Nginx konteyner daxilində port 80-də dinləyir
    listen 80;

    # Server adı — hələlik hər hansı ad qəbul edilir
    server_name _;

    # Kök qovluq — Laravel-in "public" qovluğu
    # Təhlükəsizlik: yalnız public qovluğu açıqdır, tətbiq kodu gizlidir
    root /var/www/html/public;

    # İndeks faylı — qovluq sorğusunda ilk axtarılan fayl
    index index.php;

    # Simvol kodlaması — Azərbaycan hərfləri düzgün görünsün
    charset utf-8;

    # -------------------------------------------------------
    # Əsas marşrutlama qaydası (Routing)
    # -------------------------------------------------------
    # try_files direktivinin işləmə qaydası:
    # 1. $uri — Sorğu olunan fayl mövcuddurmu? (məs: /css/app.css)
    # 2. $uri/ — Sorğu olunan qovluq mövcuddurmu?
    # 3. /index.php?$query_string — Heç biri yoxdursa, Laravel-ə yönləndir
    # Bu, Laravel-in bütün marşrutları idarə etməsinə imkan verir (SPA, API və s.)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------
    # PHP fayllarının emalı — FastCGI
    # -------------------------------------------------------
    # ".php" ilə bitən bütün sorğular bu bloka düşür
    location ~ \.php$ {
        # FastCGI parametrləri — standart Nginx-PHP əlaqə parametrləri
        include fastcgi_params;

        # PHP-FPM-ə qoşulma ünvanı
        # "app" — Docker Compose-dakı servis adıdır (DNS ilə həll olunur)
        # 9000 — PHP-FPM-in standart portudur
        fastcgi_pass app:9000;

        # PHP faylının tam yolu
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # İndeks faylı
        fastcgi_index index.php;

        # Bufer parametrləri — böyük cavablar üçün
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # -------------------------------------------------------
    # Gizli faylların bloklanması
    # -------------------------------------------------------
    # ".ht" ilə başlayan fayllara (məs: .htaccess, .htpasswd) girişi bağlayırıq
    # Apache fayllarıdır, Nginx-də lazım deyil, amma təhlükəsizlik üçün bloklayırıq
    location ~ /\.ht {
        deny all;
    }

    # -------------------------------------------------------
    # Statik fayllar üçün keşləmə
    # -------------------------------------------------------
    # Şəkil, CSS, JS faylları üçün brauzer keşi aktivləşdirilir
    # "log_not_found off" — tapılmayan statik fayllar üçün log yazılmır
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        log_not_found off;
        access_log off;
    }
}
