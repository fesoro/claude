<!DOCTYPE html>
<!--
  Sifariş təsdiq email şablonu
  Go template sintaksisi: {{.FieldName}}
  Laravel: {{ $variable }}  ·  Spring: [[${variable}]] (Thymeleaf)

  Ötürülən dəyişənlər (map[string]any):
  - .OrderID  → Sifariş UUID (string)
  - .Amount   → Ümumi məbləğ (int64, qəpik)
  - .Currency → Valyuta kodu (string: AZN, USD, EUR)
-->
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:20px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff;border-radius:8px;overflow:hidden;">

                <!-- Başlıq -->
                <tr>
                    <td style="background-color:#2d7d46;color:#ffffff;padding:30px;text-align:center;">
                        <h1 style="margin:0;font-size:24px;">Sifarişiniz Təsdiq Edildi!</h1>
                        <p style="margin:10px 0 0;font-size:16px;">Sifariş #{{.OrderID}}</p>
                    </td>
                </tr>

                <!-- Məzmun -->
                <tr>
                    <td style="padding:30px;">
                        <p style="color:#333333;font-size:16px;margin:0 0 20px;">
                            Salam! Sifarişiniz uğurla qəbul edildi.
                        </p>

                        <table width="100%" style="font-size:14px;color:#555555;background-color:#f8f8f8;border-radius:6px;">
                            <tr>
                                <td style="padding:12px 15px;border-bottom:1px solid #eeeeee;">
                                    <strong>Sifariş ID:</strong>
                                </td>
                                <td style="padding:12px 15px;border-bottom:1px solid #eeeeee;text-align:right;">
                                    {{.OrderID}}
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:12px 15px;">
                                    <strong>Ümumi məbləğ:</strong>
                                </td>
                                <td style="padding:12px 15px;text-align:right;font-weight:bold;color:#2d7d46;font-size:18px;">
                                    {{.Amount}} qəpik {{.Currency}}
                                </td>
                            </tr>
                        </table>

                        <p style="color:#555555;font-size:14px;margin:20px 0 0;">
                            Sifarişinizin statusunu hesabınızdan izləyə bilərsiniz.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background-color:#f8f8f8;padding:20px;text-align:center;font-size:12px;color:#999999;">
                        <p style="margin:0 0 5px;">Sualınız varsa: support@eshop.az</p>
                        <p style="margin:0;">Bu email avtomatik olaraq göndərilib.</p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
