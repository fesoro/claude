<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Sifariş təsdiqi</title></head>
<body>
<h2>Salam!</h2>
<p>Sifarişiniz uğurla qəbul edildi.</p>

<p>Tezliklə əlaqə saxlayacağıq.</p>
