name: Spring CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Compile
        run: ./mvnw clean compile -B

      - name: Unit tests
        run: ./mvnw test -B

      - name: Integration tests (Testcontainers — Docker lazımdır)
        run: ./mvnw verify -B
        # Docker services GitHub runners-də avtomatik
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build jar
        run: ./mvnw clean package -DskipTests -B

      - name: Docker build
        run: docker build -t ecommerce-spring:${{ github.sha }} .
