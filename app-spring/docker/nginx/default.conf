# Laravel-də nginx PHP-FPM-ə proxy edirdi (port 9000).
# Spring-də isə birbaşa Spring Boot-un embedded Tomcat-ına (port 8080).
upstream spring_app {
    server app:8080;
}

server {
    listen 80;
    server_name _;

    # Body limit (məsələn, product image upload üçün)
    client_max_body_size 20M;

    location / {
        proxy_pass http://spring_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $request_id;
        proxy_read_timeout 90s;
    }

    # Actuator endpoint-ləri (health check üçün)
    location /actuator/ {
        proxy_pass http://spring_app/actuator/;
        access_log off;
    }
}
