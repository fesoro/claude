services:
  app:
    build: .
    container_name: ecommerce-go-app
    environment:
      APP_DATABASE_USER_HOST: mysql
      APP_DATABASE_PRODUCT_HOST: mysql
      APP_DATABASE_ORDER_HOST: mysql
      APP_DATABASE_PAYMENT_HOST: mysql
      APP_REDIS_HOST: redis
      APP_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      APP_MAIL_HOST: mailpit
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [ecommerce-net]
    expose: ["8080"]

  nginx:
    image: nginx:alpine
    container_name: ecommerce-go-nginx
    ports: ["8080:80"]
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [ecommerce-net]

  mysql:
    image: mysql:8.0
    container_name: ecommerce-go-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports: ["3306:3306"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecommerce-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-go-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ecommerce-net]

  redis:
    image: redis:7-alpine
    container_name: ecommerce-go-redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [ecommerce-net]

  mailpit:
    image: axllent/mailpit:latest
    container_name: ecommerce-go-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [ecommerce-net]

volumes:
  mysql-data:
  redis-data:

networks:
  ecommerce-net:
    driver: bridge
